name: birthday_pulse
description: "BirthdayPulse — умный напоминатель о днях рождения"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Local DB
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.3

  # Contacts import
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.1

  # Calendar UI
  table_calendar: ^3.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  dynamic_color: ^1.7.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
